# Nginx reverse proxy example for TinyFeedback.
# 1. Run the app on 127.0.0.1:3847 (HOST=127.0.0.1 npm start)
# 2. Copy/adapt this into sites-available and enable TLS (certbot or your CA)
# 3. Set PUBLIC_URL=https://tinyfeedback.example.com in .env

server {
    listen 80;
    listen [::]:80;
    server_name tinyfeedback.example.com;

    # Redirect to HTTPS once certificates exist:
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://127.0.0.1:3847;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}

